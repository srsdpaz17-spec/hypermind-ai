services:
  postgres:
    image: postgres:15-alpine
    container_name: hypermind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hypermind
      POSTGRES_USER: hypermind
      POSTGRES_PASSWORD: hypermind_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypermind -d hypermind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hypermind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypermind-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      APP_NAME: HyperMind AI
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://hypermind:hypermind_dev@postgres:5432/hypermind
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production-please
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
